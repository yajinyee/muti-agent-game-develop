# nginx.conf — 吉伊卡哇：像素大討伐
# Nginx 反向代理 + TLS 終止 + WebSocket 支援
#
# 功能：
#   - HTTP → HTTPS 強制重定向
#   - wss:// WebSocket 代理（TLS 終止）
#   - COOP/COEP headers（SharedArrayBuffer 必要）
#   - Rate Limiting（防止 DDoS）
#   - Gzip 壓縮
#   - 靜態資源快取

# ── 全局設定 ──────────────────────────────────────────────────
user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 日誌格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # 效能設定
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # Gzip 壓縮
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json
               application/javascript application/xml+rss
               application/atom+xml image/svg+xml;

    # Rate Limiting（防止 DDoS）
    limit_req_zone $binary_remote_addr zone=ws_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

    # ── HTTP → HTTPS 重定向 ──────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # 其他所有請求強制 HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS + WSS 主服務 ───────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name _;

        # TLS 憑證（Let's Encrypt 或自簽）
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;

        # TLS 安全設定（2026 最佳實踐）
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # HSTS（強制 HTTPS，1 年）
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # 安全 Headers
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # SharedArrayBuffer 必要 Headers（Godot HTML5 需要）
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;

        # ── WebSocket 代理（wss://）──────────────────────────
        location /ws {
            # Rate Limiting（WebSocket 連線）
            limit_req zone=ws_limit burst=20 nodelay;

            proxy_pass http://gameserver:7777;
            proxy_http_version 1.1;

            # WebSocket 升級必要 Headers
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket 長連線設定（遊戲需要持久連線）
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            proxy_connect_timeout 10s;

            # 緩衝設定（WebSocket 不需要緩衝）
            proxy_buffering off;
        }

        # ── API 端點代理 ─────────────────────────────────────
        location ~ ^/(health|metrics|stats|rooms|leaderboard|analytics|jackpot) {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass http://gameserver:7777;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # API 快取控制
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # ── 靜態資源（Godot HTML5 Export）───────────────────
        location / {
            proxy_pass http://gameserver:7777;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 靜態資源快取（.pck, .wasm, .js 等）
            location ~* \.(pck|wasm|js|css|png|jpg|wav|ogg)$ {
                proxy_pass http://gameserver:7777;
                proxy_cache_valid 200 1h;
                add_header Cache-Control "public, max-age=3600";
                # 保留 COOP/COEP（Godot HTML5 需要）
                add_header Cross-Origin-Opener-Policy "same-origin" always;
                add_header Cross-Origin-Embedder-Policy "require-corp" always;
            }
        }
    }
}
